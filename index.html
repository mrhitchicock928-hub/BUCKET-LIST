<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 버킷 리스트</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 고급스러운 타이포그래피용 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="gradient-background min-h-screen py-12">

    <!-- 떠오르는 기포 배경 효과 (장식용, 동적으로 채워짐) -->
    <div id="bubbles" class="bubbles-layer" aria-hidden="true"></div>

    <div class="container relative z-10 mx-auto px-4 max-w-4xl">
        <!-- 헤더 -->
        <header class="text-center mb-12">
            <p class="eyebrow text-xs tracking-[0.35em] uppercase mb-3">My Life Journal</p>
            <h1 class="page-title text-5xl font-bold mb-3">
                <span class="title-gold">나의 버킷 리스트</span>
            </h1>
            <div class="header-divider mx-auto mb-4"></div>
            <p class="subtitle text-lg">인생에서 꼭 이루고 싶은 것들을 우아하게 기록하세요</p>
        </header>

        <!-- 통계 -->
        <div class="stats-card bg-white bg-opacity-5 backdrop-blur-md rounded-2xl shadow-2xl p-8 mb-8 border border-opacity-20">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="stat-item text-center">
                    <p class="text-4xl font-bold bg-gradient-to-r from-sky-300 to-blue-500 bg-clip-text text-transparent" id="totalCount">0</p>
                    <p class="stat-label text-sm mt-2">전체</p>
                </div>
                <div class="stat-item text-center">
                    <p class="text-4xl font-bold bg-gradient-to-r from-emerald-300 to-emerald-500 bg-clip-text text-transparent" id="completedCount">0</p>
                    <p class="stat-label text-sm mt-2">완료</p>
                </div>
                <div class="stat-item text-center">
                    <p class="text-4xl font-bold bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent" id="progressCount">0</p>
                    <p class="stat-label text-sm mt-2">진행중</p>
                </div>
                <div class="stat-item text-center">
                    <p class="text-4xl font-bold bg-gradient-to-r from-purple-300 to-fuchsia-400 bg-clip-text text-transparent" id="completionRate">0%</p>
                    <p class="stat-label text-sm mt-2">달성률</p>
                </div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="form-card bg-white bg-opacity-5 backdrop-blur-md rounded-2xl shadow-2xl p-8 mb-8 border border-opacity-20">
            <form id="bucketForm" class="flex gap-3">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="새로운 버킷 리스트를 입력하세요..."
                    class="elegant-input flex-1 px-5 py-3 rounded-xl focus:outline-none transition-all"
                    required
                >
                <button
                    type="submit"
                    class="btn-primary btn-gold px-8 py-3 rounded-xl transition-all font-semibold shadow-lg hover:shadow-xl transform hover:scale-105"
                >
                    추가
                </button>
            </form>
        </div>

        <!-- 필터 -->
        <div class="filter-card bg-white bg-opacity-5 backdrop-blur-md rounded-2xl shadow-2xl p-6 mb-8 border border-opacity-20">
            <div class="flex gap-3 justify-center flex-wrap">
                <button
                    class="filter-btn px-8 py-2.5 rounded-full font-medium transition-all active"
                    data-filter="all"
                >
                    전체
                </button>
                <button
                    class="filter-btn px-8 py-2.5 rounded-full font-medium transition-all"
                    data-filter="active"
                >
                    진행중
                </button>
                <button
                    class="filter-btn px-8 py-2.5 rounded-full font-medium transition-all"
                    data-filter="completed"
                >
                    완료
                </button>
            </div>
        </div>

        <!-- 버킷 리스트 목록 -->
        <div id="bucketListContainer" class="space-y-3">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- 빈 상태 메시지 -->
        <div id="emptyState" class="text-center py-12 hidden">
            <p class="text-lg">아직 버킷 리스트가 없습니다.</p>
            <p>위에서 새로운 목표를 추가해보세요!</p>
        </div>

        <!-- jslove0514 풍선을 들고 노는 아기 마스코트 (모바일: 콘텐츠 하단, 데스크탑: 화면에 고정) -->
        <div class="baby-mascot" id="babyMascot" title="jslove0514">
            <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="balloonGradient" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#fdf3cf"/>
                        <stop offset="45%" stop-color="#f0cf6b"/>
                        <stop offset="100%" stop-color="#caa44b"/>
                    </linearGradient>
                </defs>
                <g class="baby-bob">
                    <!-- 풍선 + 끈 (오른손에서 흔들림) -->
                    <g class="balloon-swing" style="transform-origin: 138px 90px;">
                        <line x1="138" y1="90" x2="138" y2="80" stroke="#caa44b" stroke-width="2" stroke-linecap="round"/>
                        <path d="M131 66 L138 80 L145 66 Z" fill="url(#balloonGradient)" stroke="#b8860b" stroke-width="1"/>
                        <ellipse cx="138" cy="30" rx="34" ry="38" fill="url(#balloonGradient)" stroke="#b8860b" stroke-width="1.5"/>
                        <ellipse cx="126" cy="17" rx="8" ry="11" fill="rgba(255,255,255,0.5)"/>
                        <text x="138" y="27" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" font-weight="700" fill="#3a2e12" letter-spacing="0.5">jslove</text>
                        <text x="138" y="40" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" font-weight="700" fill="#3a2e12" letter-spacing="0.5">0514</text>
                    </g>

                    <!-- 그림자 -->
                    <ellipse cx="100" cy="206" rx="46" ry="10" fill="rgba(0,0,0,0.18)"/>

                    <!-- 다리 -->
                    <ellipse cx="82" cy="204" rx="14" ry="10" fill="#ffe3a3"/>
                    <ellipse cx="118" cy="204" rx="14" ry="10" fill="#ffe3a3"/>

                    <!-- 우주복(바디슈트) -->
                    <path d="M60 150 C60 120 80 108 100 108 C120 108 140 120 140 150 L138 196 C138 206 128 212 100 212 C72 212 62 206 62 196 Z" fill="#ffd1e6"/>
                    <circle cx="88" cy="170" r="4" fill="#ffffff" opacity="0.85"/>
                    <circle cx="100" cy="180" r="4" fill="#ffffff" opacity="0.85"/>
                    <circle cx="112" cy="170" r="4" fill="#ffffff" opacity="0.85"/>

                    <!-- 왼팔 (내려놓은 팔) -->
                    <path d="M64 140 C50 150 46 165 52 178" stroke="#ffd1e6" stroke-width="16" stroke-linecap="round" fill="none"/>
                    <circle cx="51" cy="180" r="9" fill="#ffe3c2"/>

                    <!-- 오른팔 (풍선 잡은 팔) -->
                    <path d="M136 140 C146 128 140 108 138 96" stroke="#ffd1e6" stroke-width="16" stroke-linecap="round" fill="none"/>
                    <circle cx="138" cy="92" r="9" fill="#ffe3c2"/>

                    <!-- 머리 -->
                    <circle cx="100" cy="95" r="52" fill="#ffe3c2"/>
                    <circle cx="50" cy="95" r="9" fill="#ffe3c2"/>
                    <circle cx="150" cy="95" r="9" fill="#ffe3c2"/>

                    <!-- 머리카락 -->
                    <path d="M78 52 C85 30 115 30 122 52 C112 46 88 46 78 52Z" fill="#5b4636"/>
                    <path d="M97 40 C99 28 105 28 104 39" stroke="#5b4636" stroke-width="5" stroke-linecap="round" fill="none"/>

                    <!-- 볼터치 -->
                    <ellipse cx="70" cy="105" rx="9" ry="6" fill="#ffb6c1" opacity="0.75"/>
                    <ellipse cx="130" cy="105" rx="9" ry="6" fill="#ffb6c1" opacity="0.75"/>

                    <!-- 눈 -->
                    <circle cx="82" cy="92" r="5.5" fill="#3a2e12"/>
                    <circle cx="118" cy="92" r="5.5" fill="#3a2e12"/>
                    <circle cx="84" cy="90" r="1.6" fill="#ffffff"/>
                    <circle cx="120" cy="90" r="1.6" fill="#ffffff"/>

                    <!-- 입 -->
                    <path d="M90 112 Q100 120 110 112" stroke="#9a5b4a" stroke-width="3" stroke-linecap="round" fill="none"/>
                </g>
            </svg>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50">
        <div class="modal-card rounded-2xl p-6 max-w-md w-full mx-4">
            <h3 class="modal-title text-xl font-bold mb-4">버킷 리스트 수정</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-4 py-3 rounded-lg focus:outline-none mb-4"
                    required
                >
                <div class="flex gap-2 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors"
                    >
                        취소
                    </button>
                    <button
                        type="submit"
                        class="btn-gold px-4 py-2 rounded-lg transition-colors"
                    >
                        저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/effects.js"></script>
</body>
</html>
